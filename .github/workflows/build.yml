name: Gorizyon Builder v8

on:
  repository_dispatch:
    types: [aswv_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu GitHub'dan Çek
        uses: actions/checkout@v4

      - name: Java JDK 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Gradelw Yetkisini Düzenle
        run: chmod +x gradlew

      - name: swv.properties ve Strings Güncelle (Gelişmiş Arama)
        run: |
          # swv.properties dosyasını bul ve içine yaz
          # find komutu dosyayı nerede olursa olsun bulur ve sed ile değiştirir
          find . -name "swv.properties" -exec sed -i "s|^app.url=.*|app.url=${{ github.event.client_payload.app_url }}|g" {} +
          
          # Strings.xml içindeki APP_NAME_PLACEHOLDER'ı bul ve değiştir
          find . -name "strings.xml" -exec sed -i "s|APP_NAME_PLACEHOLDER|${{ github.event.client_payload.app_name }}|g" {} +

      - name: APK Derleme (Build)
        run: ./gradlew assembleDebug

      - name: APK Dosyasını Sunucuya Geri Gönder
        run: |
          # APK'yı bul ve tam yolunu al
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          
          # Dosya adını sadece log için yazdıralım
          echo "Bulunan APK: $APK_PATH"
          
          # Curl ile gönderim (İsimleri senin PHP ile eşledim)
          curl -v -X POST \
          -H "Expect:" \
          -F "file=@$APK_PATH" \
          -F "build_id=${{ github.event.client_payload.app_id }}" \
          "https://gorizyon.com.tr/builder/callback.php?token=123"
